name: tasky
description: An offline-first cross-platform task & habit tracker built with Flutter, Riverpod and Hive.
publish_to: "none"
version: 1.0.0+1

# Tasky uses the modern Color API (`withValues`, `toARGB32`) and Material 3
# `surfaceContainerHighest`, which require Flutter 3.27+ / Dart 3.6+.
environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local offline persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts for habit statistics
  fl_chart: ^0.68.0

  # Date & number formatting
  intl: ^0.19.0

  # Typography (optional, used for a polished look)
  google_fonts: ^6.2.1

  # Stable, collision-resistant ids
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints
  flutter_lints: ^4.0.0

  # Hive TypeAdapter code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
