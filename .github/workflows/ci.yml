name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # Hard stop well below the runner default (6h) — a hung test should
    # fail fast, not wedge the queue.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Scaffold platform folders
        run: flutter create . --platforms web --project-name tasky

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        # Per-test timeout: fail a hung test in 2 minutes instead of the
        # framework's 10-minute default.
        run: flutter test --timeout 120s
